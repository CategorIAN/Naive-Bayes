<!DOCTYPE html>
<html lang="en">
<head>
    <title>Naive Bayes Experiments</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }
        nav {
            background: #333;
            padding: 10px;
        }
        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline
        }
        .container {
            padding: 20px
        }
    </style>
    <style>
        .main-nav {
            background: #333;
            padding: 10px;
        }

        .main-nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        .dataset-nav {
            background: #eee;
            padding: 8px 10px;
            border-bottom: 1px solid #ccc;
        }

        .dataset-nav a {
            margin-right: 10px;
            text-decoration: none;
            color: #333;
        }

        .dataset-nav a.active {
            font-weight: bold;
            color: #000;
            border-bottom: 2px solid #000;
        }
    </style>

    <style>
    .table-scroll {
        width: 100%;
        max-height: 400px;   /* controls vertical size */
        overflow: auto;
        position: relative
    }

    .table-scroll table {
        min-width: 1200px;
        border-collapse: separate;
        border-spacing: 0;
    }

    .table-scroll th,
    .table-scroll td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: left;
        white-space: nowrap;
        background: white;
    }

    /* sticky header */
    .table-scroll thead th {
        position: sticky;
        top: 0;
        z-index: 2;
        background: #f3f3f3;
    }
    </style>
    <style>
    .dataframe-table {
        border-collapse: collapse;
        min-width: 900px;
    }

    .dataframe-table th,
    .dataframe-table td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: left;
        white-space: nowrap;
    }

    .dataframe-table th {
        background: #f3f3f3;
    }
</style>
<style>
.wrong-row td {
    background: #f8d7da;
}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

<nav class="main-nav">
    <a href="/">Home</a>
    <a href="/info/">Dataset Information</a>
    <a href="/data/">Data</a>
    <a href="/predictions/">Predictions</a>
    <a href="/hyperparameter_error/">Hyperparameter Error</a>
    <a href="/best_hyperparameters/">Best Hyperparameters</a>
</nav>

<nav class="dataset-nav">
    <a href="?dataset=soybean"
       class="{% if current_dataset == 'soybean' %}active{% endif %}">
       Soybean
    </a>
    <a href="?dataset=breast-cancer"
       class="{% if current_dataset == 'breast-cancer' %}active{% endif %}">
       Breast Cancer
    </a>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
