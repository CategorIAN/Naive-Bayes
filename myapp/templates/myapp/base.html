<!DOCTYPE html>
<html lang="en">
<head>
    <title>Naive Bayes Experiments</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }
    </style>
    <!-------------------------------------------------------------->
    <style>
        nav {
            background: #333;
            padding: 10px;
        }
        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline
        }
    </style>
    <!-------------------------------------------------------------->
    <style>
        .container {
            margin-left: 300px;
        }
    </style>
    <!-------------------------------------------------------------->
    <style>
        .sidebar {
            display: flex;        /* 🔥 puts them side by side */
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
        }
    </style>
    <!-------------------------------------------------------------->
    <style>
        .main-nav {
            background: #333;
            padding: 10px;
            top: 0;
            bottom: 0;
            left: 0;
            width: 100px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .main-nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        .dataset-nav {
            background: #eee;
            padding: 10px;
            width: 100px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .dataset-nav a {
            margin-right: 10px;
            text-decoration: none;
            color: #333;
        }

        .dataset-nav a.active, .main-nav a.active {
            font-weight: bold;
            color: blue;
            border-bottom: 2px solid blue;
        }
    </style>

    <style>
        .table-scroll {
            width: 100%;
            max-height: 380px;   /* controls vertical size */
            overflow: auto;
            position: relative
        }

        .table-scroll table {
            min-width: 1200px;
            border-collapse: separate;
            border-spacing: 0;
        }

        .table-scroll th,
        .table-scroll td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
            white-space: nowrap;
            background: white;
        }

        /* sticky header */
        .table-scroll thead th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: #f3f3f3;
        }
    </style>
    <style>
        .dataframe-table {
            border-collapse: collapse;
            min-width: 900px;
        }

        .dataframe-table th,
        .dataframe-table td {
            border: 1px solid #ccc;
            padding: 1px;
            text-align: left;
            white-space: nowrap;
        }

        .dataframe-table th {
            background: #f3f3f3;
        }
    </style>
    <style>
        .wrong-row td {
            background: #f8d7da;
        }
    </style>
{% block extra_head %}{% endblock %}
</head>
<body>
<div class="sidebar">
    <nav class="main-nav">
        <a href="/info/?dataset={{ current_dataset }}"
        class="{% if current_page == 'info' %}active{% endif %}">
            About
        </a>
        <a href="/data/?dataset={{ current_dataset }}"
        class="{% if current_page == 'data' %}active{% endif %}">
            Data
        </a>
        <a href="/predictions/?dataset={{ current_dataset }}"
        class="{% if current_page == 'predictions' %}active{% endif %}">
            Predict
        </a>
        <a href="/hyperparameter_error/?dataset={{ current_dataset }}"
        class="{% if current_page == 'hyperparameter_error' %}active{% endif %}">
            Error
        </a>
        <a href="/best_hyperparameters/?dataset={{ current_dataset }}"
        class="{% if current_page == 'best_hyperparameters' %}active{% endif %}">
            Best Model
        </a>
    </nav>

    <nav class="dataset-nav">
        <a href="?dataset=soybean"
           class="{% if current_dataset == 'soybean' %}active{% endif %}">
           Soybean
        </a>
        <a href="?dataset=breast-cancer"
           class="{% if current_dataset == 'breast-cancer' %}active{% endif %}">
           Breast Cancer
        </a>
        <a  href="?dataset=glass"
            class="{% if current_dataset == 'glass' %}active{% endif %}">
            Glass
        </a>
    </nav>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
