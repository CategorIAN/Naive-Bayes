{% extends "myapp/base.html" %}
{% block extra_head %}
<style>
    /* sticky first column */
    .table-scroll th:first-child,
    .table-scroll td:first-child {
        position: sticky;
        left: 0;
        z-index: 1;
        background: #fff3cd;
        font-weight: bold;
    }

    /* top-left corner cell */
    .table-scroll thead th:first-child {
        z-index: 3;
        background: #e9e9e9;
    }

    /* sticky last column (class column) */
    .table-scroll th:last-child,
    .table-scroll td:last-child {
        position: sticky;
        right: 0;
        z-index: 1;
        background: #d4edda;   /* different color so it stands out */
        font-weight: bold;
    }

    /* top-right corner (header of last column) */
    .table-scroll thead th:last-child {
        z-index: 3;
        background: #c3e6cb;
    }
</style>
{% endblock %}
{% block content %}
<h1>{{ title }}</h1>
<div class="table-scroll">
{{ table_html | safe }}
</div>
{% endblock %}
